server:
  port: 8080

spring:
  application:
    name: jaipur-travel

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/jaipur_travel?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    access-secret: ${JWT_ACCESS_SECRET:defaultAccessSecretKeyThatShouldBeChangedInProduction2024!}
    refresh-secret: ${JWT_REFRESH_SECRET:defaultRefreshSecretKeyThatShouldBeChangedInProduction2024!}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}

  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173}

  huggingface:
    api-key: ${HF_CHAT_API_KEY:}
    base-url: ${HF_CHAT_BASE_URL:https://api-inference.huggingface.co/models}
    model: ${HF_CHAT_MODEL:mistralai/Mistral-7B-Instruct-v0.2}

  weather:
    api-key: ${WEATHER_API_KEY:}
    base-url: ${WEATHER_API_BASE_URL:https://api.openweathermap.org/data/2.5}
    cache-minutes: ${WEATHER_CACHE_MINUTES:30}

  chat:
    rate-limit:
      window-seconds: ${CHAT_RATE_LIMIT_WINDOW_SECONDS:60}
      max-requests: ${CHAT_RATE_LIMIT_MAX_REQUESTS:10}

  makcorps:
    api-key: ${MAKCORPS_API_KEY:}
    base-url: ${MAKCORPS_BASE_URL:https://api.makcorps.com}
    jaipur-city-id: ${MAKCORPS_JAIPUR_CITY_ID:304555}
    max-pages: ${MAKCORPS_MAX_PAGES:1}
    cache-minutes: ${HOTEL_PRICE_CACHE_MINUTES:120}

  hotelsapi:
    api-key: ${HOTELS_API_KEY:}
    base-url: ${HOTELS_API_BASE_URL:https://api.hotels-api.com/v1}
    default-city: ${HOTELS_API_DEFAULT_CITY:Jaipur}
    default-country: ${HOTELS_API_DEFAULT_COUNTRY:India}
    cache-minutes: ${HOTELS_API_CACHE_MINUTES:60}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.example.jaipurtravel: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"